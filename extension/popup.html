<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Recall AI</title>
  <style>
    :root {
      --bg: #0b0c10;
      --panel: #1f2833;
      --primary: #c5a059; /* Custom premium accent */
      --violet: #8a2be2;
      --cyan: #00ffff;
      --text: #c5c6c7;
      --white: #ffffff;
      --danger: #ff4d4d;
      --success: #2ecc71;
    }

    body {
      width: 320px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      padding: 16px;
      box-sizing: border-box;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 12px;
      margin-bottom: 16px;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-img {
      width: 24px;
      height: 24px;
      border-radius: 4px;
    }

    .logo-text {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.5px;
      background: linear-gradient(135deg, var(--cyan), var(--violet));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .status-active {
      background-color: rgba(46, 204, 113, 0.15);
      color: var(--success);
      border: 1px solid rgba(46, 204, 113, 0.3);
    }

    .status-paused {
      background-color: rgba(197, 160, 89, 0.15);
      color: #f39c12;
      border: 1px solid rgba(197, 160, 89, 0.3);
    }

    .status-blocked {
      background-color: rgba(255, 77, 77, 0.15);
      color: var(--danger);
      border: 1px solid rgba(255, 77, 77, 0.3);
    }

    .card {
      background-color: var(--panel);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .card-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 8px;
      font-weight: 600;
    }

    .page-info {
      font-size: 13px;
      color: var(--white);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .page-domain {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 8px;
    }

    .btn {
      width: 100%;
      background: linear-gradient(135deg, var(--cyan), var(--violet));
      color: var(--white);
      border: none;
      padding: 10px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 13px;
      transition: opacity 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    .btn-danger {
      background: rgba(255, 77, 77, 0.1);
      border: 1px solid rgba(255, 77, 77, 0.3);
      color: var(--danger);
    }

    .btn-danger:hover {
      background: rgba(255, 77, 77, 0.2);
    }

    .pause-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .footer-links {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      margin-top: 16px;
    }

    .footer-links a {
      color: var(--cyan);
      text-decoration: none;
    }

    .footer-links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-container">
      <img src="icon.png" class="logo-img" alt="logo">
      <span class="logo-text">Recall AI</span>
    </div>
    <div id="statusBadge" class="status-badge status-active">
      <span>●</span> <span id="statusText">Active</span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Current Tab</div>
    <div id="pageTitle" class="page-info">Loading Page...</div>
    <div id="pageDomain" class="page-domain">loading...</div>
    <button id="blockToggleBtn" class="btn btn-secondary">Block Domain</button>
  </div>

  <div class="card">
    <div class="card-title">Pause Recording</div>
    <div class="pause-options">
      <button id="pause10Btn" class="btn btn-secondary">10 Mins</button>
      <button id="pause60Btn" class="btn btn-secondary">1 Hour</button>
    </div>
  </div>

  <button id="dashboardBtn" class="btn">
    Open Dashboard
  </button>

  <div class="footer-links">
    <a href="#" id="viewPrefs">Privacy Preferences</a>
    <span style="color: rgba(255,255,255,0.2)">v1.0</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
